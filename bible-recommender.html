    :root {

      --red-dark:  #b01e2b;

      font-family: 'Poppins', system-ui, sans-serif;

      min-height: 100vh;

      justify-content: center;

    }

    .container {
      background: white;

      max-width: 600px;
      width: 100%;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 20px 28px 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 16px;
    }
    .header-logo {
      height: 48px;
      width: auto;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--black);
      line-height: 1.2;
    }
    .header-text p {
      font-size: 0.78rem;
      color: #999;
      margin-top: 2px;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      background: #eee;
      height: 4px;
    }
    .progress-bar {
      background: var(--red);
      height: 4px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 0.72rem;
      color: #aaa;
      padding: 6px 0 0;
      text-align: right;
      padding-right: 2px;
      height: 22px;
    }

    /* ── Quiz body ── */

      font-size: 1.1rem;
      font-weight: 600;
      color: var(--black);

      line-height: 1.4;

      border: 2px solid var(--border);

      text-align: left;
      background: white;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      color: #333;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 10px;

      color: var(--red-dark);
    }

    .btn-back {

// ── Google Sheets CSV integration ────────────────────────────────────────────

// Minimal CSV parser that handles quoted fields containing commas
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));

  return lines.slice(1).map(line => {
    const values = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') {
        inQuotes = !inQuotes;
      } else if (line[i] === ',' && !inQuotes) {
        values.push(current.trim());
        current = '';
      } else {
        current += line[i];
      }
    }
    values.push(current.trim());

    const row = {};
    headers.forEach((h, i) => { row[h] = (values[i] || '').replace(/^"|"$/g, ''); });
    return row;
  }).filter(row => row["Title"]); // skip blank rows
}

// Auto-infer recommendation tags from the product title and price.
// This means your Google Sheet only needs: Title, Price (INR), Handle.
function inferTags(title, price) {
  const t = title.toLowerCase();

  // Language — look for Indian language names in the title; default to English
  const LANGS = ["telugu","tamil","hindi","malayalam","kannada","bengali","assamese","nepali","marathi","punjabi","odia"];
  const language = LANGS.find(l => t.includes(l)) || "english";

  // Format
  let format = "standard";
  if (/large.?print|large.?type|\blp\b/.test(t))                         format = "largeprint";
  else if (/pocket|compact|thinline|slimline|economy|personal.?size/.test(t)) format = "compact";
  else if (/journal|filament/.test(t))                                    format = "journaling";
  else if (/leadership|leader/.test(t))                                   format = "leadership";
  else if (/study.?bible|study.?bib|backgrounds|reference/.test(t))      format = "study";

  // Purpose
  const purpose = [];
  if (/recover|devotion|prayer|celebrat|rainbow/.test(t)) purpose.push("devotion");
  if (/study|backgrounds|reference|justice/.test(t))      purpose.push("study");
  if (/outreach/.test(t))                                 purpose.push("gift");
  if (/boys|girls|youth|children|kids|student/.test(t))  purpose.push("children");
  if (purpose.length === 0) purpose.push("devotion");

  // Level
  let level = "casual";
  if (/study|backgrounds|reference|cultural/.test(t)) level = "advanced";
  else if (/youth|economy|outreach|boys|story/.test(t)) level = "new";

  // Budget from price
  const budget = price >= 1000 ? "high" : price >= 500 ? "medium" : "low";

  // Denomination — NIV/NLT/KJV/NKJV/ESV/Message are broadly non-denominational
  const denomination = ["protestant", "nondenominational"];
  if (/catholic/.test(t))          denomination.splice(0, 2, "catholic");
  else if (/pentecostal|spirit/.test(t)) denomination.splice(0, 2, "pentecostal");

  return { language: [language], format: [format], purpose, level: [level], budget: [budget], denomination };
}

// Convert one Google Sheet row into a product object.
// Expected columns: Title | ISBN | Price (INR) | Handle
function rowToProduct(row) {
  const name   = row["Title"]         || "";
  const price  = parseInt(row["Price (INR)"] || "0") || 0;
  const handle = row["Handle"]        || "";
  return {
    id:             handle || name,
    name,
    price:          `₹${price.toLocaleString("en-IN")}`,
    description:    "",
    tags:           inferTags(name, price),
    popularityScore: 0.7,
    coBoughtWith:   [],
    shopifyUrl:     handle ? `${STORE_URL}/products/${handle}` : `${STORE_URL}/collections/all`,
  };
}

async function fetchGoogleSheetProducts() {
  const res = await fetch(GSHEET_URL);
  if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status}`);
  const text = await res.text();
  return parseCSV(text).map(rowToProduct);
}

  },
  {

    text: "Which of these best describes you as a reader?",
    options: [
      { emoji: "⛪", label: "I carry my Bible to church every week",      value: "compact" },
      { emoji: "👁️", label: "I prefer large, easy-to-read text",          value: "largeprint" },
      { emoji: "💼", label: "I'm in business / entrepreneurship",          value: "leadership" },
      { emoji: "✏️", label: "I love writing notes & journaling",           value: "journaling" },

    ],

  {

    text: "How would you describe your Bible reading experience?",
    options: [
      { emoji: "🌱", label: "New believer / just starting",  value: "new" },
      { emoji: "📚", label: "Regular reader",                value: "casual" },
      { emoji: "🎓", label: "Serious student / leader",      value: "advanced" },
    ],

  {
    id: "denomination",

// ─────────────────────────────────────────────────────────────────────────────
//  SCORING ENGINE
// ─────────────────────────────────────────────────────────────────────────────

// Weight given to each tag match (tune these based on what drives conversions)
const TAG_WEIGHTS = {
  language:     5,   // highest — wrong language = wrong product
  purpose:      3,
  format:       4,   // high — now directly asked; compact/largeprint/leadership/journaling are decisive
  denomination: 2,
  level:        2,
  budget:       3,
};

// How much the collaborative signal can boost a product (0–1 scale)
const COLLAB_BOOST_MAX = 0.15;

/**
 * Content-based score: how well does a product's tags match the quiz answers?
 * Returns a raw score (higher is better).
 */
function contentScore(product, answers) {
  let score = 0;
  for (const [dimension, weight] of Object.entries(TAG_WEIGHTS)) {
    const answer = answers[dimension];
    if (!answer) continue;
    const productTags = product.tags[dimension] || [];
    if (productTags.includes(answer)) {
      score += weight;
    }
  }
  return score;
}

/**
 * Collaborative boost: if highly-scoring products are often co-bought with
 * this product, give it a small extra push.
 *
 * In production, replace `product.coBoughtWith` with real co-purchase counts
 * from your Shopify order history.
 */
function collaborativeBoost(product, topProductIds) {
  const overlaps = product.coBoughtWith.filter(id => topProductIds.includes(id));
  // Scale: 1 overlap = half boost, 2+ = full boost
  const ratio = Math.min(overlaps.length / 2, 1);
  return ratio * COLLAB_BOOST_MAX;
}

/**
 * Main recommendation function.
 * Returns top N products with their final scores and explanations.
 */
function recommend(answers, topN = 3) {
  const maxPossibleContent = Object.values(TAG_WEIGHTS).reduce((a, b) => a + b, 0);

  // Step 1: content-based scores
  const scored = ACTIVE_PRODUCTS.map(p => ({
    product: p,
    rawContent: contentScore(p, answers),
  }));

  // Step 2: identify top content matches (for collaborative signal)
  const sortedByContent = [...scored].sort((a, b) => b.rawContent - a.rawContent);
  const top3Ids = sortedByContent.slice(0, 3).map(s => s.product.id);

  // Step 3: final score = normalised content + popularity + collaborative boost
  const finalScored = scored.map(({ product, rawContent }) => {
    const normContent   = rawContent / maxPossibleContent;          // 0–1
    const collab        = collaborativeBoost(product, top3Ids);    // 0–0.15
    const popularity    = product.popularityScore * 0.1;           // 0–0.1 (gentle nudge)
    const finalScore    = normContent * 0.75 + popularity + collab;

    return { product, finalScore, normContent };
  });

  finalScored.sort((a, b) => b.finalScore - a.finalScore);
  return finalScored.slice(0, topN);
}

// ─────────────────────────────────────────────────────────────────────────────
//  QUIZ STATE
// ─────────────────────────────────────────────────────────────────────────────
let currentStep = 0;
let answers = {};

function startQuiz() {
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentStep];
  const total = QUESTIONS.length;

  // Progress
  const pct = Math.round(((currentStep) / total) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent =
    `Question ${currentStep + 1} of ${total}`;

  // Question
  document.getElementById("questionText").textContent = q.text;

  // Options
  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn" + (answers[q.id] === opt.value ? " selected" : "");
    btn.innerHTML = `<span class="emoji">${opt.emoji}</span> ${opt.label}`;
    btn.onclick = () => selectOption(opt.value, btn);
    container.appendChild(btn);
  });

  // Nav buttons
  document.getElementById("btnBack").style.visibility = currentStep === 0 ? "hidden" : "visible";
  document.getElementById("btnNext").disabled = !answers[q.id];
  document.getElementById("btnNext").textContent =
    currentStep === total - 1 ? "See Recommendations →" : "Next →";
}

function selectOption(value, clickedBtn) {
  const q = QUESTIONS[currentStep];
  answers[q.id] = value;
  document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
  clickedBtn.classList.add("selected");
  document.getElementById("btnNext").disabled = false;
}

function goNext() {
  if (currentStep < QUESTIONS.length - 1) {
    currentStep++;
    renderQuestion();
  } else {
    showResults();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderQuestion();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  RESULTS
// ─────────────────────────────────────────────────────────────────────────────
function whyText(product, answers) {
  const reasons = [];
  if (product.tags.language?.includes(answers.language)) {
    reasons.push(`Available in ${capitalise(answers.language)}`);
  }
  if (product.tags.purpose?.includes(answers.purpose)) {
    const purposeLabel = { devotion: "daily devotion", study: "study", gift: "gifting", children: "children" };
    reasons.push(`Suited for ${purposeLabel[answers.purpose] || answers.purpose}`);
  }
  if (product.tags.format?.includes(answers.format)) {
    const formatLabel = {
      compact:    "slim & easy to carry to church",
      largeprint: "large print — easy on the eyes",
      leadership: "leadership insights for business life",
      journaling: "wide margins for notes & journaling",
      study:      "in-depth study notes",
      standard:   "standard home reading",
      illustrated:"illustrated for children",
    };
    reasons.push(formatLabel[answers.format] || capitalise(answers.format));
  }
  if (product.tags.denomination?.includes(answers.denomination)) {
    reasons.push(`Fits ${capitalise(answers.denomination)} tradition`);
  }
  if (product.tags.budget?.includes(answers.budget)) {
    reasons.push("Within your budget");
  }
  return reasons.length ? reasons.join(" · ") : product.description;
}

function capitalise(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function showResults() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("progressLabel").textContent = "Complete!";

  const results = recommend(answers);
  const el = document.getElementById("results");
  const list = document.getElementById("productList");
  list.innerHTML = "";

  document.getElementById("resultsSubtitle").textContent =
    `Based on your answers, here are the Bibles we recommend for you.`;

  results.forEach((r, i) => {
    const p = r.product;
    const pct = Math.round(r.finalScore * 100);
    const card = document.createElement("div");
    card.className = "product-card" + (i === 0 ? " top-pick" : "");

    const tagList = [
      answers.language && capitalise(answers.language),
      answers.purpose  && { devotion: "Devotion", study: "Study", gift: "Gift", children: "Children's" }[answers.purpose],
      answers.format   && { compact: "Compact", largeprint: "Large Print", leadership: "Leadership", journaling: "Journaling", standard: "Standard" }[answers.format],
      answers.denomination && capitalise(answers.denomination),
    ].filter(Boolean);

    card.innerHTML = `
      ${i === 0 ? '<span class="badge">Best Match</span>' : ""}
      <div class="product-name">${p.name}</div>
      <div class="product-price">${p.price}</div>
      <div class="score-row">
        <span class="score-label">Match</span>
        <div class="score-track"><div class="score-fill" style="width:${pct}%"></div></div>
        <span class="score-pct">${pct}%</span>
      </div>
      <div class="product-why">${whyText(p, answers)}</div>
      <div class="product-tags">${tagList.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <button class="btn-view" onclick="window.open('${p.shopifyUrl}', '_blank')">
        View Product →
      </button>
    `;
    list.appendChild(card);
  });

  el.style.display = "block";
}

function restart() {
  currentStep = 0;
  answers = {};
  document.getElementById("results").style.display = "none";
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("progressLabel").textContent = "";
  document.getElementById("welcome").classList.remove("hidden");
}
</script>
